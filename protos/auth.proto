syntax = "proto3";

package auth;

service AuthService {
  // Returns user information for the given username.
  rpc UserDetails(UserDetailsRequest) returns (UserDetailsResponse);
}

message UserDetailsRequest {
  string username = 1;
}

message UserDetailsResponse {
  string user_id = 1;
  string username = 2;
  string email = 3;
  repeated string roles = 4;
  int64 created_at = 5; // Unix timestamp (seconds)
  bool is_active = 6;
}
